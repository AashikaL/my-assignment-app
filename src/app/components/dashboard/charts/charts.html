<div class="chart-container">
  <div class="chart-header">
    <div class="chart-tabs">
      <button 
        class="tab-btn" 
        [class.active]="activeTab === 'Total Users'" 
        (click)="switchTab('Total Users')">
        Total Users
      </button>
      <button 
        class="tab-btn" 
        [class.active]="activeTab === 'Total Projects'" 
        (click)="switchTab('Total Projects')">
        Total Projects
      </button>
      <button 
        class="tab-btn" 
        [class.active]="activeTab === 'Operating Status'" 
        (click)="switchTab('Operating Status')">
        Operating Status
      </button>
    </div>
  </div>

  <div id="chart" *ngIf="chartOptions">
    <apx-chart
      [series]="chartOptions.series!"
      [chart]="chartOptions.chart!"
      [xaxis]="chartOptions.xaxis!"
      [yaxis]="chartOptions.yaxis!"
      [stroke]="chartOptions.stroke!"
      [dataLabels]="chartOptions.dataLabels!"
      [plotOptions]="chartOptions.plotOptions!"
      [labels]="chartOptions.labels!"
      [legend]="chartOptions.legend!"
      [colors]="chartOptions.colors!"
      [fill]="chartOptions.fill!"
      [tooltip]="chartOptions.tooltip!"
      [title]="chartOptions.title!"
      [grid]="chartOptions.grid!"
    ></apx-chart>
  </div>
</div>
